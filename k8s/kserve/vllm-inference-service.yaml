apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: vllm-dialogpt
  namespace: llm-system
  annotations:
    autoscaling.knative.dev/target: "1"
    autoscaling.knative.dev/minScale: "1"
    autoscaling.knative.dev/maxScale: "3"
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 3
    serviceAccountName: llm-serviceaccount
    containers:
      - name: kserve-container
        image: substratusai/vllm:main-cpu
        imagePullPolicy: IfNotPresent
        args:
          - "--model"
          - "microsoft/DialoGPT-small"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8080"
          - "--device"
          - "cpu"
          - "--dtype"
          - "float32"
          - "--max-model-len"
          - "1024"
        env:
          - name: HF_HOME
            value: /hf-cache
          - name: HF_HUB_DOWNLOAD_TIMEOUT
            value: "600"
          - name: VLLM_CPU_KVCACHE_SPACE
            value: "4"
        ports:
          - containerPort: 8080
            name: http1
            protocol: TCP
        resources:
          requests:
            cpu: "4"
            memory: "8Gi"
          limits:
            cpu: "8"
            memory: "16Gi"
        volumeMounts:
          - name: model-cache
            mountPath: /hf-cache
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 60
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 1800
          periodSeconds: 30
          timeoutSeconds: 5
    volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache-pvc
