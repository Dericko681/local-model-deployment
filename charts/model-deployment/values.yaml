# =============================================================================
# Model Deployment Helm Chart - Production Values
# =============================================================================
# This chart deploys a vLLM inference service using KServe/Knative
# Configuration is organized into logical sections for easy customization

# =============================================================================
# GLOBAL SETTINGS
# =============================================================================
serving:
  global:
    nameOverride: model-deployment
    createDefaultServiceAccount: false

  # ServiceAccount configuration
  # Default: disabled (uses namespace default service account)
  serviceAccount:
    main:
      enabled: false

  # =============================================================================
  # CONFIGMAPS - Chat templates and configuration
  # =============================================================================
  configMaps:
    phi2-chat-template:
      enabled: true
      forceRename: phi2-chat-template
      data:
        chat_template.jinja: |
          {% for message in messages %}
          {% if message['role'] == 'user' %}
          User: {{ "{{" }} message['content'] {{ "}}" }}
          {% elif message['role'] == 'assistant' %}
          Assistant: {{ "{{" }} message['content'] {{ "}}" }}
          {% elif message['role'] == 'system' %}
          System: {{ "{{" }} message['content'] {{ "}}" }}
          {% endif %}
          {% endfor %}
          {% if add_generation_prompt %}
          Assistant:
          {% endif %}

  # =============================================================================
  # PERSISTENT STORAGE - HuggingFace model cache
  # =============================================================================
  persistence:
    model-cache:
      enabled: true
      type: persistentVolumeClaim
      forceRename: model-cache
      size: 50Gi
      accessMode: ReadWriteOnce
      retain: true
      storageClass: ""

  # =============================================================================
  # MODEL CONFIGURATION
  # =============================================================================
  # Define models as a map for easy reference and extensibility
  # Each model can have its own configuration
  models:
    phi2:
      # Model identification
      name: phi2
      inferenceService: vllm-phi2
      
      # HuggingFace model configuration
      huggingface:
        repository: microsoft/phi-2
        revision: ""
        token: ""  # Set if using private models
      
      # Model runtime configuration
      runtime:
        maxModelLen: 2048
        dtype: float32
        device: cpu
        chatTemplate: /chat-template/chat_template.jinja
      
      # Resource allocation
      resources:
        requests:
          cpu: "4"
          memory: 8Gi
        limits:
          cpu: "8"
          memory: 16Gi
      
      # Autoscaling configuration (Knative)
      autoscaling:
        minScale: 1
        maxScale: 3
        target: 1  # Concurrency target
      
      # Probes configuration
      probes:
        startup:
          enabled: true
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 60
          timeoutSeconds: 5
        readiness:
          enabled: true
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        liveness:
          enabled: true
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 300
          periodSeconds: 30
          timeoutSeconds: 5

  # =============================================================================
  # VLLM RUNTIME CONFIGURATION
  # =============================================================================
  vllm:
    # Container image configuration
    image:
      repository: substratusai/vllm
      tag: main-cpu
      pullPolicy: IfNotPresent
    
    # Server configuration
    server:
      host: 0.0.0.0
      port: 8080
      portName: http1
    
    # Runtime arguments
    args:
      device: cpu
      dtype: float32
    
    # Environment variables as a map
    env:
      HF_HOME: /hf-cache
      HF_HUB_DOWNLOAD_TIMEOUT: "600"
      VLLM_CPU_KVCACHE_SPACE: "4"
      # Additional environment variables can be added here
      # HF_TOKEN: ""  # Uncomment if needed for private models
      # TRANSFORMERS_CACHE: ""
    
    # Security context (optional)
    securityContext: {}
    #   runAsNonRoot: true
    #   runAsUser: 1000
    #   readOnlyRootFilesystem: true
    
    # Pod security context (optional)
    podSecurityContext: {}
    #   fsGroup: 1000
    
    # Node affinity (optional)
    affinity: {}
    #   nodeAffinity:
    #     requiredDuringSchedulingIgnoredDuringExecution:
    #       nodeSelectorTerms:
    #       - matchExpressions:
    #         - key: kubernetes.io/arch
    #           operator: In
    #           values:
    #           - amd64
    
    # Node selector (optional)
    nodeSelector: {}
    #   kubernetes.io/os: linux
    
    # Tolerations (optional)
    tolerations: []
    #   - key: "nvidia.com/gpu"
    #     operator: "Exists"
    #     effect: "NoSchedule"

  # =============================================================================
  # KNATIVE/GATEWAY CONFIGURATION
  # =============================================================================
  knative:
    gateway:
      service: kourier
      namespace: kourier-system
      port: 80

  # =============================================================================
  # RAW RESOURCES - KServe InferenceService
  # =============================================================================
  # Note: Within app-template, .Values refers to the serving: section
  # Using hardcoded values for rawResources spec to avoid YAML parsing issues
  # with template expressions in YAML objects
  rawResources:
    phi2:
      enabled: true
      forceRename: vllm-phi2
      apiVersion: serving.kserve.io/v1beta1
      kind: InferenceService
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "3"
        autoscaling.knative.dev/target: "1"
      labels:
        app: vllm-phi2
      spec:
        spec:
          predictor:
            containers:
              - name: kserve-container
                image: substratusai/vllm:main-cpu
                imagePullPolicy: IfNotPresent
                args:
                  - --host=0.0.0.0
                  - --port=8080
                  - --model=microsoft/phi-2
                  - --max-model-len=2048
                  - --device=cpu
                  - --dtype=float32
                  - --chat-template=/chat-template/chat_template.jinja
                env:
                  - name: HF_HOME
                    value: /hf-cache
                  - name: HF_HUB_DOWNLOAD_TIMEOUT
                    value: "600"
                  - name: VLLM_CPU_KVCACHE_SPACE
                    value: "4"
                ports:
                  - containerPort: 8080
                    name: http1
                    protocol: TCP
                resources:
                  requests:
                    cpu: "4"
                    memory: 8Gi
                  limits:
                    cpu: "8"
                    memory: 16Gi
                volumeMounts:
                  - name: hf-cache
                    mountPath: /hf-cache
                  - name: chat-template
                    mountPath: /chat-template
                    readOnly: true
                startupProbe:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  failureThreshold: 60
                  timeoutSeconds: 5
                readinessProbe:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                livenessProbe:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 300
                  periodSeconds: 30
                  timeoutSeconds: 5
            volumes:
              - name: hf-cache
                persistentVolumeClaim:
                  claimName: model-cache
              - name: chat-template
                configMap:
                  name: phi2-chat-template
