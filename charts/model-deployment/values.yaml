serving:
  global:
    nameOverride: model-deployment
    createDefaultServiceAccount: false

  configMaps:
    phi2-chat-template:
      enabled: true
      forceRename: phi2-chat-template
      data:
        chat_template.jinja: |
          {% for message in messages %}
          {% if message['role'] == 'user' %}
          User: {{ "{{" }} message['content'] {{ "}}" }}
          {% elif message['role'] == 'assistant' %}
          Assistant: {{ "{{" }} message['content'] {{ "}}" }}
          {% elif message['role'] == 'system' %}
          System: {{ "{{" }} message['content'] {{ "}}" }}
          {% endif %}
          {% endfor %}
          {% if add_generation_prompt %}
          Assistant:
          {% endif %}

  persistence:
    model-cache:
      enabled: true
      type: persistentVolumeClaim
      forceRename: model-cache
      size: 50Gi
      accessMode: ReadWriteOnce
      retain: true
      storageClass: ""

servingRuntimes:
  vllm-cpu:
    enabled: true
    annotations: {}
    labels: {}
    spec:
      multiModel: false
      disabled: false
      supportedModelFormats:
        - name: huggingface
          version: "1"
          autoSelect: true
          priority: 1
      protocolVersions:
        - v1
      containers:
        kserve-container:
          image:
            repository: substratusai/vllm
            tag: main-cpu
            pullPolicy: IfNotPresent
          ports:
            http1:
              containerPort: 8080
              protocol: TCP
          env:
            HF_HOME: /hf-cache
            HF_HUB_DOWNLOAD_TIMEOUT: "600"
            VLLM_CPU_KVCACHE_SPACE: "4"
          resources: {}
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 60
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            model-cache:
              mountPath: /hf-cache
      nodeSelector: {}
      tolerations: []
      affinity: {}

inferenceServices:
  phi2:
    enabled: true
    name: vllm-phi2
    annotations:
      autoscaling.knative.dev/minScale: "1"
      autoscaling.knative.dev/maxScale: "3"
      autoscaling.knative.dev/target: "1"
    labels:
      app: vllm-phi2
    spec:
      predictor:
        minReplicas: 1
        maxReplicas: 3
        timeout: 300
        scaleMetric: concurrency
        scaleTarget: 1
        model:
          modelFormat:
            name: huggingface
          runtime: vllm-cpu
          storageUri: hf://microsoft/phi-2
          args:
            host: 0.0.0.0
            port: "8080"
            model: microsoft/phi-2
            max-model-len: "2048"
            device: cpu
            dtype: float32
            chat-template: /chat-template/chat_template.jinja
          resources:
            requests:
              cpu: "4"
              memory: 8Gi
            limits:
              cpu: "8"
              memory: 16Gi
          volumeMounts:
            chat-template:
              mountPath: /chat-template
              readOnly: true
        volumes:
          chat-template:
            configMap:
              name: phi2-chat-template
          model-cache:
            persistentVolumeClaim:
              claimName: model-cache
