serving:
  global:
    nameOverride: model-deployment
    createDefaultServiceAccount: false

 
  configMaps:
    phi2-chat-template:
      enabled: true
      forceRename: phi2-chat-template
      data:
        chat_template.jinja: |
          {% for message in messages %}
          {% if message['role'] == 'user' %}
          User: {{ "{{" }} message['content'] {{ "}}" }}
          {% elif message['role'] == 'assistant' %}
          Assistant: {{ "{{" }} message['content'] {{ "}}" }}
          {% elif message['role'] == 'system' %}
          System: {{ "{{" }} message['content'] {{ "}}" }}
          {% endif %}
          {% endfor %}
          {% if add_generation_prompt %}
          Assistant:
          {% endif %}

  persistence:
    model-cache:
      enabled: true
      type: persistentVolumeClaim
      forceRename: model-cache
      size: 50Gi
      accessMode: ReadWriteOnce
      retain: true
      storageClass: ""

  models:
    phi2:
      inferenceService: vllm-phi2
      repository: microsoft/phi-2
      maxModelLen: 2048
      device: cpu
      dtype: float32
      chatTemplate: /chat-template/chat_template.jinja
      resources:
        requests:
          cpu: "4"
          memory: 8Gi
        limits:
          cpu: "8"
          memory: 16Gi
      autoscaling:
        minScale: 1
        maxScale: 3
        target: 1

  vllm:
    image:
      repository: substratusai/vllm
      tag: main-cpu
      pullPolicy: IfNotPresent
    server:
      host: 0.0.0.0
      port: 8080
      portName: http1
    env:
      HF_HOME: /hf-cache
      HF_HUB_DOWNLOAD_TIMEOUT: "600"
      VLLM_CPU_KVCACHE_SPACE: "4"

  knative:
    gateway:
      service: kourier
      namespace: kourier-system
      port: 80

  rawResources:
    phi2:
      enabled: true
      forceRename: vllm-phi2
      apiVersion: serving.kserve.io/v1beta1
      kind: InferenceService
      annotations:
        autoscaling.knative.dev/minScale: "{{ .Values.models.phi2.autoscaling.minScale }}"
        autoscaling.knative.dev/maxScale: "{{ .Values.models.phi2.autoscaling.maxScale }}"
        autoscaling.knative.dev/target: "{{ .Values.models.phi2.autoscaling.target }}"
      labels:
        app: vllm-phi2
      spec:
        spec:
          predictor:
            containers:
              - name: kserve-container
                image: "{{ .Values.vllm.image.repository }}:{{ .Values.vllm.image.tag }}"
                imagePullPolicy: "{{ .Values.vllm.image.pullPolicy }}"
                args:
                  - "--host={{ .Values.vllm.server.host }}"
                  - "--port={{ .Values.vllm.server.port }}"
                  - "--model={{ .Values.models.phi2.repository }}"
                  - "--max-model-len={{ .Values.models.phi2.maxModelLen }}"
                  - "--device={{ .Values.models.phi2.device }}"
                  - "--dtype={{ .Values.models.phi2.dtype }}"
                  - "--chat-template={{ .Values.models.phi2.chatTemplate }}"
                env:
                  - name: HF_HOME
                    value: "{{ .Values.vllm.env.HF_HOME }}"
                  - name: HF_HUB_DOWNLOAD_TIMEOUT
                    value: "{{ .Values.vllm.env.HF_HUB_DOWNLOAD_TIMEOUT }}"
                  - name: VLLM_CPU_KVCACHE_SPACE
                    value: "{{ .Values.vllm.env.VLLM_CPU_KVCACHE_SPACE }}"
                ports:
                  - containerPort: "{{ .Values.vllm.server.port }}"
                    name: "{{ .Values.vllm.server.portName }}"
                    protocol: TCP
                resources:
                  requests:
                    cpu: "{{ .Values.models.phi2.resources.requests.cpu }}"
                    memory: "{{ .Values.models.phi2.resources.requests.memory }}"
                  limits:
                    cpu: "{{ .Values.models.phi2.resources.limits.cpu }}"
                    memory: "{{ .Values.models.phi2.resources.limits.memory }}"
                volumeMounts:
                  - name: hf-cache
                    mountPath: /hf-cache
                  - name: chat-template
                    mountPath: /chat-template
                    readOnly: true
                startupProbe:
                  httpGet:
                    path: /health
                    port: "{{ .Values.vllm.server.port }}"
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  failureThreshold: 60
                  timeoutSeconds: 5
                readinessProbe:
                  httpGet:
                    path: /health
                    port: "{{ .Values.vllm.server.port }}"
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                livenessProbe:
                  httpGet:
                    path: /health
                    port: "{{ .Values.vllm.server.port }}"
                  initialDelaySeconds: 300
                  periodSeconds: 30
                  timeoutSeconds: 5
            volumes:
              - name: hf-cache
                persistentVolumeClaim:
                  claimName: model-cache
              - name: chat-template
                configMap:
                  name: phi2-chat-template
