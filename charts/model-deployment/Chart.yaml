apiVersion: v2
name: model-deployment
description: |
  Deploys LLM models (Phi-2, DialoGPT-small) using vLLM, KServe, and Knative.
  Provides an OpenAI-compatible API endpoint per model.

type: application
version: 0.2.0
appVersion: "1.0"
kubeVersion: ">=1.28.0-0"

keywords:
  - llm
  - vllm
  - kserve
  - knative
  - inference
  - phi-2
  - dialogpt

home: https://github.com/adorsys/model-deployment
sources:
  - https://github.com/adorsys/model-deployment

maintainers:
  - name: adorsys
    email: Derick.Kunga@adorsys.com

dependencies:
  - name: app-template
    alias: serving
    repository: https://bjw-s-labs.github.io/helm-charts
    version: 4.6.2
